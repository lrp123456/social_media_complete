# ============================================================
# 社交媒体矩阵智能运营系统 - Docker Compose
# 全 host 网络模式：容器直连宿主机端口，可访问 Windows 指纹浏览器
# ============================================================

services:
  # ============================================================
  # PostgreSQL 15
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: sm-postgres
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sm_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-social_media}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sm_admin} -d ${POSTGRES_DB:-social_media}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: sm-redis
    network_mode: host
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD} --port 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # LiteLLM Proxy - 大模型网关
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: sm-litellm
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://${POSTGRES_USER:-sm_admin}:${POSTGRES_PASSWORD}@localhost:5432/litellm_db}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?请在 .env 中设置 LITELLM_MASTER_KEY}
      STORE_MODEL_IN_DB: "true"
      LITELLM_MIGRATION_DIR: "/tmp/litellm_migrations"
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:?请在 .env 中设置 UI_PASSWORD}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,open.bigmodel.cn}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    command: >
      --config /app/config.yaml
      --port 4000
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # TS API Gateway - 大脑与自动化执行官
  # ============================================================
  ts-api-gateway:
    build:
      context: .
      dockerfile: apps/ts-api-gateway/Dockerfile
    container_name: sm-ts-api
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database (host 模式下用 localhost)
      DATABASE_URL: ${DATABASE_URL:?请在 .env 中设置 DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?请在 .env 中设置 REDIS_URL}
      # Server
      NODE_ENV: production
      TS_API_PORT: ${TS_API_PORT:-3001}
      TZ: ${TZ:-Asia/Shanghai}
      # OSS
      OSS_REGION: ${OSS_REGION:-cn-beijing}
      OSS_BUCKET: ${OSS_BUCKET:?请在 .env 中设置 OSS_BUCKET}
      OSS_ENDPOINT: ${OSS_ENDPOINT:?请在 .env 中设置 OSS_ENDPOINT}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:?请在 .env 中设置 OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:?请在 .env 中设置 OSS_ACCESS_KEY_SECRET}
      # Python Worker (同 host 网络)
      PYTHON_WORKER_URL: ${PYTHON_WORKER_URL:-http://localhost:8000}
      # LiteLLM (同 host 网络)
      LITELLM_URL: ${LITELLM_URL:-http://localhost:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:?请在 .env 中设置 LITELLM_API_KEY}
      # 指纹浏览器 (network_mode: host, 直接访问 localhost)
      ROXY_BROWSER_URL: ${ROXY_BROWSER_URL:-http://localhost:54345}
      ROXY_BROWSER_KEY: ${ROXY_BROWSER_KEY:?请在 .env 中设置 ROXY_BROWSER_KEY}
      BIT_BROWSER_URL: ${BIT_BROWSER_URL:-http://localhost:54346}
      # 企业微信机器人
      WECOM_BOT_ID: ${WECOM_BOT_ID:?请在 .env 中设置 WECOM_BOT_ID}
      WECOM_BOT_SECRET: ${WECOM_BOT_SECRET:?请在 .env 中设置 WECOM_BOT_SECRET}
      # API Gateway
      API_GATEWAY_KEY: ${API_GATEWAY_KEY:?请在 .env 中设置 API_GATEWAY_KEY}
      # 反检测模式: legacy (默认) | v2
      #   legacy — 抖音采集/发布/登录沿用旧 CDP 路径（page.evaluate / page.$）
      #   v2     — 全部收口到 HumanActions 原生 Locator + RequestInterceptor 拦截器
      #            + safeEvaluate 隔离世界，降低指纹特征暴露风险
      #   切换方式: 修改此变量后 docker compose up -d ts-api-gateway 即可回滚
      #   关联文档: docs/superpowers/plans/2026-06-25-anti-detection-douyin-pilot-plan.md
      ANTI_DETECTION_MODE: ${ANTI_DETECTION_MODE:-v2}
    volumes:
      - ts_api_data:/app/apps/ts-api-gateway/data

  # ============================================================
  # Python Worker - 肌肉与算力中心
  # ============================================================
  python-worker:
    build:
      context: .
      dockerfile: apps/python-worker/Dockerfile
    container_name: sm-python-worker
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${PYTHON_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-sm_admin}:${POSTGRES_PASSWORD}@localhost:5432/social_media}
      REDIS_URL: ${REDIS_URL:?请在 .env 中设置 REDIS_URL}
      PYTHON_WORKER_PORT: ${PYTHON_WORKER_PORT:-8000}
      TZ: ${TZ:-Asia/Shanghai}
      OSS_REGION: ${OSS_REGION:-cn-beijing}
      OSS_BUCKET: ${OSS_BUCKET:?请在 .env 中设置 OSS_BUCKET}
      OSS_ENDPOINT: ${OSS_ENDPOINT:?请在 .env 中设置 OSS_ENDPOINT}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:?请在 .env 中设置 OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:?请在 .env 中设置 OSS_ACCESS_KEY_SECRET}
      TS_WEBHOOK_URL: ${TS_WEBHOOK_URL:-http://localhost:3001/api/v1/webhook/python-callback}
      LITELLM_URL: ${LITELLM_URL:-http://localhost:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:?请在 .env 中设置 LITELLM_API_KEY}

  # ============================================================
  # Admin Dashboard - Next.js 前端
  # ============================================================
  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: sm-admin-dashboard
    network_mode: host
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
      PORT: ${PORT:-3000}
      HOSTNAME: "0.0.0.0"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ts_api_data:
    driver: local
