# ============================================================
# 社交媒体矩阵智能运营系统 - Docker Compose
# 全 host 网络模式：容器直连宿主机端口，可访问 Windows 指纹浏览器
# ============================================================

services:
  # ============================================================
  # PostgreSQL 15
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: sm-postgres
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_USER: sm_admin
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: social_media
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sm_admin -d social_media"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: sm-redis
    network_mode: host
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass your_redis_password --port 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your_redis_password", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # LiteLLM Proxy - 大模型网关
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: sm-litellm
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://sm_admin:your_postgres_password@localhost:5432/litellm_db"
      LITELLM_MASTER_KEY: "your_litellm_master_key"
      STORE_MODEL_IN_DB: "true"
      LITELLM_MIGRATION_DIR: "/tmp/litellm_migrations"
      UI_USERNAME: "admin"
      UI_PASSWORD: "your_litellm_master_key"
      HTTP_PROXY: "http://localhost:7897"
      HTTPS_PROXY: "http://localhost:7897"
      NO_PROXY: "localhost,127.0.0.1,open.bigmodel.cn"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    command: >
      --config /app/config.yaml
      --port 4000
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # TS API Gateway - 大脑与自动化执行官
  # ============================================================
  ts-api-gateway:
    build:
      context: .
      dockerfile: apps/ts-api-gateway/Dockerfile
    container_name: sm-ts-api
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database (host 模式下用 localhost)
      DATABASE_URL: "postgresql://sm_admin:your_postgres_password@localhost:5432/social_media"
      REDIS_URL: "redis://:your_redis_password@localhost:6379"
      # Server
      NODE_ENV: production
      TS_API_PORT: "3001"
      TZ: Asia/Shanghai
      # OSS
      OSS_REGION: cn-beijing
      OSS_BUCKET: naite-mes
      OSS_ENDPOINT: img.naite.cc
      OSS_ACCESS_KEY_ID: your_oss_access_key_id
      OSS_ACCESS_KEY_SECRET: your_oss_access_key_secret
      # Python Worker (同 host 网络)
      PYTHON_WORKER_URL: "http://localhost:8000"
      # LiteLLM (同 host 网络)
      LITELLM_URL: "http://localhost:4000"
      LITELLM_API_KEY: "your_litellm_master_key"
      # 指纹浏览器 (network_mode: host, 直接访问 localhost)
      ROXY_BROWSER_URL: "http://localhost:54345"
      ROXY_BROWSER_KEY: "your_roxy_browser_key"
      BIT_BROWSER_URL: "http://localhost:54346"
      # 企业微信机器人
      WECOM_BOT_ID: "your_wecom_bot_id"
      WECOM_BOT_SECRET: "your_wecom_bot_secret"
    volumes:
      - ts_api_data:/app/apps/ts-api-gateway/data

  # ============================================================
  # Python Worker - 肌肉与算力中心
  # ============================================================
  python-worker:
    build:
      context: .
      dockerfile: apps/python-worker/Dockerfile
    container_name: sm-python-worker
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://sm_admin:your_postgres_password@localhost:5432/social_media"
      REDIS_URL: "redis://:your_redis_password@localhost:6379"
      PYTHON_WORKER_PORT: "8000"
      TZ: Asia/Shanghai
      OSS_REGION: cn-beijing
      OSS_BUCKET: naite-mes
      OSS_ENDPOINT: img.naite.cc
      OSS_ACCESS_KEY_ID: your_oss_access_key_id
      OSS_ACCESS_KEY_SECRET: your_oss_access_key_secret
      TS_WEBHOOK_URL: "http://localhost:3001/api/v1/webhook/python-callback"
      LITELLM_URL: "http://localhost:4000"
      LITELLM_API_KEY: "your_litellm_master_key"

  # ============================================================
  # Admin Dashboard - Next.js 前端
  # ============================================================
  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: sm-admin-dashboard
    network_mode: host
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001/api/v1"
      NODE_ENV: production
      TZ: Asia/Shanghai
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ts_api_data:
    driver: local
