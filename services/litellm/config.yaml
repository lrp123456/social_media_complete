# LiteLLM Proxy 配置 - 社交媒体矩阵智能运营系统
# 模型存储到 PostgreSQL (store_model_in_db: true)

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  user_url_allowed_hosts:
    - "localhost"
    - "127.0.0.1"
    - "host.docker.internal"

model_list: []  # 所有模型统一在 DB 中管理，避免 config key 与 DB key 冲突

router_settings:
  routing_strategy: "usage-based-routing"
  num_retries: 2
  allowed_fails: 3
  cooldown_time: 30

litellm_settings:
  drop_params: true
  set_verbose: false
  store_model_in_db: true
  database_url: os.environ/DATABASE_URL
  disable_health_checks: true  # 跳过启动时模型健康检查，加速启动
  user_url_allowed_hosts:
    - "localhost"
    - "127.0.0.1"
    - "host.docker.internal"

environment_variables:
  # 全局代理（海外 API 走代理，国内直连）
  HTTP_PROXY: os.environ/HTTP_PROXY
  HTTPS_PROXY: os.environ/HTTPS_PROXY
  NO_PROXY: "localhost,127.0.0.1,postgres,redis,0.0.0.0,open.bigmodel.cn"
